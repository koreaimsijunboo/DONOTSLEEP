<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>비밀의 테트리스</title>
    <style>
        body { background: #0f0f0f; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        canvas { border: 2px solid #00ff88; box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); }
        .info { margin-top: 20px; text-align: center; }
        .back-btn { margin-top: 20px; padding: 10px 20px; background: #333; color: white; border: none; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>🧱 비밀 테트리스</h1>
    <canvas id="tetris" width="240" height="400"></canvas>
    <div class="info">
        <div id="score">점수: 0</div>
        <p style="font-size: 12px; color: #888;">화살표 키로 조작 / 위: 회전</p>
        <button class="back-btn" onclick="history.back()">공부하러 돌아가기</button>
    </div>
    <script src="tetris.js"></script>
</body>
</html>
